name: Build IPA

on:
    workflow_dispatch:
    # push:
    #     branches:
    #         - main

permissions:
    contents: write
    pages: write
    id-token: write

jobs:
    build:
        runs-on: macos-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Set up Xcode
              uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: '16.4'

            - uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Sync node version and setup cache
              uses: actions/setup-node@v4
              with:
                  node-version: 22.14.0

            - name: Init Project Config
              run: |
                  pnpm install --no-frozen-lockfile
                  pnpm pp:worker

            - name: Generate AppIcon
              run: |
                  echo "Installing appicon tool..."
                  brew install Nonchalant/appicon/appicon
                  echo "Generating AppIcon..."
                  appicon app-icon.png --output-path ./PakePlus/Assets.xcassets/AppIcon.appiconset

            - name: Build for Release
              run: |
                  mkdir -p build
                  xcodebuild -project PakePlus.xcodeproj -scheme PakePlus -configuration Release -sdk iphoneos \
                    -derivedDataPath build \
                    CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

            - name: Package IPA
              run: |
                  APP_PATH=$(find build -type d -name "PakePlus.app" | grep Release-iphoneos | head -n 1)
                  echo "APP_PATH is $APP_PATH"
                  if [ -z "$APP_PATH" ]; then
                      echo "❌ Error: Could not find PakePlus.app!"
                      ls -la build/
                      exit 1
                  fi
                  mkdir -p Payload
                  cp -R "$APP_PATH" Payload/
                  NAME="${{ env.NAME }}"
                  VERSION="${{ env.VERSION }}"
                  ISHTML="${{ env.ISHTML }}"
                  if [ "$ISHTML" = "true" ] && [ -d "./scripts/www" ]; then
                      cp -R ./scripts/www/* ./Payload/PakePlus.app/
                  fi
                  zip -r ${NAME}-${VERSION}.ipa Payload
                  mkdir -p export
                  mv ${NAME}-${VERSION}.ipa export/
                  ls -la export/

            - name: Upload Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ipa-artifact
                  path: export/

            - name: Publish IPA
              uses: softprops/action-gh-release@v1
              with:
                  files: export/${{ env.NAME }}-${{ env.VERSION }}.ipa
                  tag_name: '${{ env.NAME }}'
                  name: '${{ env.NAME }} v${{ env.VERSION }}'
                  body: '${{ env.PUBBODY }}'
                  draft: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
